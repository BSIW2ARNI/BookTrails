{% load static %}
<article class="surface-card book-card accent-{{ book.accent|default:'blue' }}">
    <a class="book-card-cover" href="{% url 'web:book_detail' book.id %}">
        <img src="{% static book.cover %}" alt="Обложка {{ book.title }}">
    </a>
    <div class="book-card-body">
        <div class="book-card-meta">
            <span class="genre-pill">{{ book.genre.name|default:'' }}</span>
            <span class="rating-pill">★ {{ book.rating }}</span>
        </div>
        <h3><a href="{% url 'web:book_detail' book.id %}">{{ book.title }}</a></h3>
        <p class="muted">{{ book.author_names|join:', ' }}</p>
        <p>{{ book.description|truncatechars:110 }}</p>
        <div class="card-footer-row">
            <span class="muted">{{ book.language.name|default:'' }} · {{ book.year }}</span>
            <a class="text-link" href="{% url 'web:book_detail' book.id %}">Открыть</a>
        </div>
    </div>
</article>
