<article class="surface-card recommendation-card accent-{{ recommendation.accent|default:'cyan' }}">
    <div class="recommendation-top">
        <span class="eyebrow">Рекомендация</span>
        <span class="rating-pill">{{ recommendation.score|floatformat:2 }}</span>
    </div>
    <h3>{{ recommendation.title }}</h3>
    <p class="muted">{{ recommendation.authors|join:', ' }}</p>
    <p>{{ recommendation.explanation }}</p>
    <div class="card-footer-row">
        <a class="text-link" href="{% url 'web:book_detail' recommendation.id|default:recommendation.book_id %}">Открыть книгу</a>
        <div class="inline-actions">
            <button class="btn btn-ghost" type="button">Сохранить</button>
            <button class="btn btn-ghost" type="button">Скрыть</button>
        </div>
    </div>
</article>
